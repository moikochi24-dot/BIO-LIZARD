<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIZARDDDDDDD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f0;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background-color: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 8px solid #4CAF50;
        }
        .header {
            background-color: #e8f5e9;
            padding: 30px;
            text-align: center;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .content {
            padding: 25px;
        }
        h1 {
            margin: 10px 0 5px 0;
            color: #2e7d32;
        }
        .species {
            color: #666;
            font-style: italic;
            margin-bottom: 20px;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
        }
        .info-table td {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .label {
            font-weight: bold;
            color: #4CAF50;
            width: 40%;
        }
        .hobby-tags {
            margin-top: 15px;
        }
        .tag {
            display: inline-block;
            background: #f1f8e9;
            color: #388e3c;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxL2A_M97fmRtBBGiQYrxUQ9rpftLLYsm60A&s" alt="Foto Lizard" class="profile-pic">
        <h1>TOM</h1>
        <p class="species">LIZARDDDDD (Eublepharis macularius)</p>
    </div>

    <div class="content">
        <table class="info-table">
            <tr>
                <td class="label">Nama Panggilan</td>
                <td>TOM</td>
            </tr>
            <tr>
                <td class="label">RILIS DI FILM</td>
                <td>6 Maret 2026</td>
            </tr>
            <tr>
                <td class="label">Makanan Favorit</td>
                <td>apa aja dimakan</td>
            </tr>
            <tr>
                <td class="label">Kepribadian</td>
                <td>agak aneh sedikit..</td>
            </tr>
        </table>

        <h3>Hobi & Kegemaran</h3>
        <div class="hobby-tags">
            <span class="tag">Santai</span>
            <span class="tag">teriak LOLOLOLOO</span>
            <span class="tag">Main</span>
            <span class="tag">Mencet emoji lizard</span>
        </div>
    </div>
</div>

</body>
</html>
